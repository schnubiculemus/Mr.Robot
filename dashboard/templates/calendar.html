{% extends "base.html" %}
{% block title %}Kalender{% endblock %}

{% block content %}
<div class="page-header">
    <div style="display:flex; align-items:center; justify-content:space-between;">
        <div>
            <h1>Kalender</h1>
            <p class="page-subtitle">Termine aus Google (Arbeit) und iCloud (Privat)</p>
        </div>
        <div style="display:flex; gap:6px;">
            <button class="view-btn active" id="btn-month" onclick="setView('month')">Monat</button>
            <button class="view-btn" id="btn-week" onclick="setView('week')">Woche</button>
        </div>
    </div>
</div>

<!-- Navigation -->
<div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
    <button class="btn-secondary" onclick="navigate(-1)">← Zurück</button>
    <span id="nav-label" style="font-size:14px; font-weight:500; color:var(--text-2); min-width:180px; text-align:center;"></span>
    <button class="btn-secondary" onclick="navigate(1)">Vor →</button>
    <button class="btn-secondary" onclick="goToday()" style="margin-left:8px;">Heute</button>
</div>

<!-- Kalender-Grid -->
<div id="calendar-container"></div>

<!-- Detail-Panel -->
<div id="detail-panel" style="display:none; position:fixed; right:24px; top:80px; width:320px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); z-index:100; padding:20px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <div id="detail-title" style="font-size:14px; font-weight:600; color:var(--text-1);"></div>
        <button onclick="closeDetail()" style="background:none; border:none; cursor:pointer; color:var(--text-4); font-size:18px; line-height:1;">×</button>
    </div>
    <div id="detail-events"></div>
</div>

<!-- Legende -->
<div style="display:flex; gap:16px; margin-top:16px;">
    <div style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-3);">
        <div style="width:10px; height:10px; border-radius:3px; background:var(--blue);"></div>Arbeit
    </div>
    <div style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-3);">
        <div style="width:10px; height:10px; border-radius:3px; background:var(--purple);"></div>Privat
    </div>
    <div style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-3);">
        <div style="width:10px; height:10px; border-radius:3px; background:var(--green, #10b981);"></div>Study
    </div>
</div>

<style>
.page-subtitle { font-size:13px; color:var(--text-3); margin-top:4px; }

.view-btn {
    padding:5px 14px; font-size:12px; font-weight:500;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-3);
    cursor:pointer; font-family:var(--font); transition:all 0.12s;
}
.view-btn:hover { background:var(--bg); color:var(--text-2); }
.view-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

.btn-secondary {
    padding:6px 12px; font-size:13px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-2);
    cursor:pointer; font-family:var(--font); transition:all 0.12s;
}
.btn-secondary:hover { background:var(--bg); border-color:var(--text-4); }

/* Monatsansicht */
.month-header-row { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
.month-header-cell { text-align:center; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-4); padding:6px 0; }

.month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }

.month-day { background:var(--surface); padding:8px; min-height:72px; cursor:pointer; transition:background 0.1s; }
.month-day:hover { background:var(--surface-2); }
.month-day.other-month { background:var(--bg); }
.month-day.other-month .day-num { color:var(--text-4); }
.month-day.today { background:var(--accent-dim); }
.month-day.today .day-num { color:var(--accent); font-weight:700; }
.month-day.selected { outline:2px solid var(--accent); outline-offset:-2px; }

.day-num { font-size:13px; font-weight:500; color:var(--text-2); margin-bottom:5px; }

.event-dot-row { display:flex; gap:3px; flex-wrap:wrap; margin-bottom:2px; }
.event-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.event-dot.work { background:var(--blue); }
.event-dot.private { background:var(--purple); }
.event-dot.study { background:var(--green, #10b981); }
.event-count { font-size:10px; color:var(--text-3); background:var(--bg); border-radius:3px; padding:1px 4px; display:inline-block; margin-top:1px; }

/* Wochenansicht */
.week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
.week-day { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px; min-height:160px; }
.week-day.today { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
.week-day-header { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-4); margin-bottom:3px; }
.week-day-num { font-size:18px; font-weight:650; color:var(--text-1); margin-bottom:8px; letter-spacing:-0.02em; }
.week-day.today .week-day-num { color:var(--accent); }

.event-pill { padding:4px 7px; border-radius:5px; font-size:11px; margin-bottom:4px; line-height:1.4; }
.event-pill.work { background:var(--blue-dim); color:var(--blue); border-left:2px solid var(--blue); }
.event-pill.private { background:var(--purple-dim); color:var(--purple); border-left:2px solid var(--purple); }
.event-pill.study { background:rgba(16,185,129,0.1); color:var(--green, #10b981); border-left:2px solid var(--green, #10b981); }
.event-time-small { font-size:10px; opacity:0.7; font-variant-numeric:tabular-nums; }
.event-title-text { font-weight:500; }
.event-recurring-label { font-size:10px; opacity:0.6; }

.no-events { color:var(--text-4); font-size:12px; text-align:center; padding:12px 0; }
.loading-pulse { color:var(--text-4); font-size:11px; text-align:center; padding:6px 0; animation:pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

.detail-event { padding:10px; border-radius:var(--radius-sm); margin-bottom:8px; }
.detail-event.work { background:var(--blue-dim); border-left:3px solid var(--blue); }
.detail-event.private { background:var(--purple-dim); border-left:3px solid var(--purple); }
.detail-event.study { background:rgba(16,185,129,0.08); border-left:3px solid var(--green, #10b981); }
.detail-event-time { font-size:11px; color:var(--text-3); margin-bottom:2px; font-variant-numeric:tabular-nums; }
.detail-event-title { font-size:13px; font-weight:500; color:var(--text-1); }
.detail-event-meta { font-size:11px; color:var(--text-4); margin-top:3px; }
</style>

<script>
const WOCHENTAGE = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONATE_LANG  = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONATE_KURZ  = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

let currentView = 'month';
let currentOffset = 0;
let eventCache = {};
let selectedDate = null;

function toLocalStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(s) { return s === toLocalStr(new Date()); }
function formatTime(iso) { return (!iso || iso.length <= 10) ? '' : iso.substring(11,16); }
function getMonday(d) {
    const m = new Date(d); m.setHours(0,0,0,0);
    const day = m.getDay(); m.setDate(m.getDate() - (day === 0 ? 6 : day - 1));
    return m;
}

async function fetchDay(dateStr) {
    if (eventCache[dateStr] !== undefined) return eventCache[dateStr];
    eventCache[dateStr] = [];
    try {
        const res = await fetch(`/api/calendar/events?date=${dateStr}`);
        const data = await res.json();
        eventCache[dateStr] = data.events || [];
    } catch(e) { eventCache[dateStr] = []; }
    return eventCache[dateStr];
}

function setView(v) {
    currentView = v; currentOffset = 0;
    document.getElementById('btn-month').classList.toggle('active', v === 'month');
    document.getElementById('btn-week').classList.toggle('active', v === 'week');
    closeDetail(); render();
}
function navigate(d) { currentOffset += d; closeDetail(); render(); }
function goToday() { currentOffset = 0; closeDetail(); render(); }
function render() { currentView === 'month' ? renderMonth() : renderWeek(); }

// ── Monatsansicht ──────────────────────────────────────────────────────────
function renderMonth() {
    const base = new Date();
    base.setDate(1);
    base.setMonth(base.getMonth() + currentOffset);
    const year = base.getFullYear(), month = base.getMonth();

    document.getElementById('nav-label').textContent = `${MONATE_LANG[month]} ${year}`;

    const first = new Date(year, month, 1);
    const last  = new Date(year, month+1, 0);
    let pad = first.getDay() - 1; if (pad < 0) pad = 6;
    const rows = Math.ceil((pad + last.getDate()) / 7);

    let html = `<div class="month-header-row">${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="month-header-cell">${d}</div>`).join('')}</div><div class="month-grid">`;

    for (let i = 0; i < rows*7; i++) {
        const d = new Date(year, month, 1 + i - pad);
        const ds = toLocalStr(d);
        const cur = d.getMonth() === month;
        html += `<div class="month-day${isToday(ds)?' today':''}${!cur?' other-month':''}${ds===selectedDate?' selected':''}" data-date="${ds}" onclick="handleDayClick('${ds}',this)">
            <div class="day-num">${d.getDate()}</div>
            <div id="ms-${ds}"><div class="loading-pulse">·</div></div>
        </div>`;
    }
    html += '</div>';
    document.getElementById('calendar-container').innerHTML = html;

    for (let i = 0; i < rows*7; i++) {
        const d = new Date(year, month, 1 + i - pad);
        loadMonthSummary(toLocalStr(d));
    }
}

async function loadMonthSummary(ds) {
    const events = await fetchDay(ds);
    const el = document.getElementById(`ms-${ds}`);
    if (!el) return;
    if (!events.length) { el.innerHTML = ''; return; }
    const shown = events.slice(0,3);
    const rest  = events.length - shown.length;
    el.innerHTML = `
        <div class="event-dot-row">${shown.map(e=>`<div class="event-dot ${e.source==='work'?'work':e.source==='study'?'study':'private'}" title="${e.title}"></div>`).join('')}</div>
        ${rest > 0 ? `<span class="event-count">+${rest}</span>` : ''}
    `;
}

// ── Wochenansicht ──────────────────────────────────────────────────────────
function renderWeek() {
    const mon = getMonday(new Date());
    mon.setDate(mon.getDate() + currentOffset*7);
    const sun = new Date(mon); sun.setDate(sun.getDate()+6);

    document.getElementById('nav-label').textContent =
        `${mon.getDate()}. ${MONATE_KURZ[mon.getMonth()]} – ${sun.getDate()}. ${MONATE_KURZ[sun.getMonth()]} ${sun.getFullYear()}`;

    let html = '<div class="week-grid">';
    for (let i = 0; i < 7; i++) {
        const d = new Date(mon); d.setDate(d.getDate()+i);
        const ds = toLocalStr(d);
        html += `<div class="week-day${isToday(ds)?' today':''}">
            <div class="week-day-header">${WOCHENTAGE[d.getDay()]}</div>
            <div class="week-day-num">${d.getDate()}</div>
            <div id="wd-${ds}"><div class="loading-pulse">…</div></div>
        </div>`;
    }
    html += '</div>';
    document.getElementById('calendar-container').innerHTML = html;

    for (let i = 0; i < 7; i++) {
        const d = new Date(mon); d.setDate(d.getDate()+i);
        loadWeekDay(toLocalStr(d));
    }
}

async function loadWeekDay(ds) {
    const events = await fetchDay(ds);
    const el = document.getElementById(`wd-${ds}`);
    if (!el) return;
    if (!events.length) { el.innerHTML = '<div class="no-events">—</div>'; return; }
    el.innerHTML = events.map(ev => {
        const cls = ev.source==='work'?'work':ev.source==='study'?'study':'private';
        const time = ev.all_day ? 'Ganztägig' : `${formatTime(ev.start)}–${formatTime(ev.end)}`;
        const rec  = ev.recurring && ev.recurrence_label ? `<div class="event-recurring-label">↻ ${ev.recurrence_label}</div>` : '';
        return `<div class="event-pill ${cls}"><div class="event-time-small">${time}</div><div class="event-title-text">${ev.title}</div>${rec}</div>`;
    }).join('');
}

// ── Detail Panel ───────────────────────────────────────────────────────────
async function handleDayClick(ds, el) {
    if (selectedDate === ds) { closeDetail(); return; }
    document.querySelectorAll('.month-day.selected').forEach(d=>d.classList.remove('selected'));
    el.classList.add('selected');
    selectedDate = ds;
    const events = await fetchDay(ds);
    const d = new Date(ds+'T00:00:00');
    document.getElementById('detail-title').textContent =
        `${WOCHENTAGE[d.getDay()]}, ${d.getDate()}. ${MONATE_LANG[d.getMonth()]} ${d.getFullYear()}`;
    const container = document.getElementById('detail-events');
    if (!events.length) {
        container.innerHTML = '<div style="color:var(--text-4);font-size:13px;padding:8px 0;">Keine Termine</div>';
    } else {
        container.innerHTML = events.map(ev => {
            const cls = ev.source==='work'?'work':ev.source==='study'?'study':'private';
            const lbl = ev.source==='work'?'Arbeit':ev.source==='study'?'Study':'Privat';
            const time = ev.all_day ? 'Ganztägig' : `${formatTime(ev.start)} – ${formatTime(ev.end)} Uhr`;
            const loc  = ev.location ? `<div class="detail-event-meta">📍 ${ev.location}</div>` : '';
            const rec  = ev.recurring && ev.recurrence_label ? `<div class="detail-event-meta">↻ ${ev.recurrence_label}</div>` : '';
            return `<div class="detail-event ${cls}">
                <div class="detail-event-time">${time} · ${lbl}</div>
                <div class="detail-event-title">${ev.title}</div>
                ${loc}${rec}
            </div>`;
        }).join('');
    }
    document.getElementById('detail-panel').style.display = 'block';
}

function closeDetail() {
    document.getElementById('detail-panel').style.display = 'none';
    document.querySelectorAll('.month-day.selected').forEach(d=>d.classList.remove('selected'));
    selectedDate = null;
}

document.addEventListener('click', e => {
    if (!document.getElementById('detail-panel').contains(e.target) && !e.target.closest('.month-day'))
        closeDetail();
});

render();
</script>
{% endblock %}
