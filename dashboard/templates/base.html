<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — SchnuBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #f5f5f4;
            --surface:      #ffffff;
            --surface-2:    #fafaf9;
            --border:       #e7e5e4;
            --border-light: #f0efee;

            --text-1:       #1c1917;
            --text-2:       #44403c;
            --text-3:       #78716c;
            --text-4:       #a8a29e;

            --accent:       #16a34a;
            --accent-light: #dcfce7;
            --accent-dim:   rgba(22, 163, 74, 0.08);

            --amber:        #d97706;
            --amber-light:  #fef3c7;
            --amber-dim:    rgba(217, 119, 6, 0.08);

            --blue:         #2563eb;
            --blue-light:   #dbeafe;
            --blue-dim:     rgba(37, 99, 235, 0.08);

            --red:          #dc2626;
            --red-light:    #fee2e2;
            --red-dim:      rgba(220, 38, 38, 0.08);

            --purple:       #7c3aed;
            --purple-light: #ede9fe;
            --purple-dim:   rgba(124, 58, 237, 0.08);

            --cyan:         #0891b2;
            --cyan-light:   #cffafe;
            --cyan-dim:     rgba(8, 145, 178, 0.08);

            --shadow-sm:    0 1px 2px rgba(0,0,0,0.05);
            --shadow:       0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md:    0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);

            --sidebar-w:    240px;
            --radius:       10px;
            --radius-sm:    6px;
            --radius-lg:    14px;

            --font:         'Geist', -apple-system, sans-serif;
            --font-mono:    'Geist Mono', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-1);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .layout {
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo-icon {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
            box-shadow: 0 1px 3px rgba(22,163,74,0.3);
        }

        .sidebar-logo-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
            line-height: 1.2;
        }

        .sidebar-logo-sub {
            font-size: 11px;
            color: var(--text-4);
            line-height: 1.3;
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 10px;
            overflow-y: auto;
        }

        .nav-section { margin-bottom: 6px; }

        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-4);
            padding: 8px 8px 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px 8px;
            border-radius: var(--radius-sm);
            color: var(--text-3);
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            transition: all 0.12s;
            margin-bottom: 1px;
        }

        .nav-link:hover { background: var(--bg); color: var(--text-2); }

        .nav-link.active {
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 500;
        }

        .nav-icon {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            opacity: 0.65;
        }

        .nav-link.active .nav-icon { opacity: 1; }

        .nav-divider {
            height: 1px;
            background: var(--border-light);
            margin: 8px 0;
        }

        .sidebar-footer {
            padding: 12px 18px;
            border-top: 1px solid var(--border-light);
        }

        .sidebar-clock {
            font-size: 12px;
            color: var(--text-4);
            font-variant-numeric: tabular-nums;
        }

        .sidebar-logout {
            display: inline-block;
            margin-top: 5px;
            font-size: 12px;
            color: var(--text-4);
            text-decoration: none;
            transition: color 0.12s;
        }

        .sidebar-logout:hover { color: var(--red); }

        /* ── Main ── */
        .main {
            padding: 32px 36px;
            overflow-y: auto;
        }

        /* ── Page Header ── */
        .page-header { margin-bottom: 28px; }

        .page-header h1 {
            font-size: 22px;
            font-weight: 650;
            letter-spacing: -0.02em;
            color: var(--text-1);
        }

        .page-header p {
            font-size: 13px;
            color: var(--text-3);
            margin-top: 3px;
        }

        /* ── Stat Cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.15s;
        }

        .stat-card:hover { box-shadow: var(--shadow); }

        .stat-card-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-4);
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-top: 8px;
            color: var(--text-1);
            line-height: 1;
        }

        .stat-card-sub {
            font-size: 12px;
            color: var(--text-4);
            margin-top: 5px;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px 24px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-1);
            letter-spacing: -0.01em;
        }

        .card-subtitle {
            font-size: 12px;
            color: var(--text-4);
            margin-top: 2px;
        }

        /* ── Table ── */
        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }

        thead { background: var(--surface-2); }

        th {
            padding: 10px 14px;
            text-align: left;
            color: var(--text-4);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 11px 14px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-2);
            vertical-align: top;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg); }
        tr.selected td { background: var(--accent-dim); }

        td.text-col { max-width: 320px; color: var(--text-1); line-height: 1.45; }
        td.mono { font-family: var(--font-mono); font-size: 12px; }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            line-height: 1.6;
        }

        .badge-active   { background: var(--accent-light); color: var(--accent); }
        .badge-archived { background: var(--border); color: var(--text-4); }

        .badge-hard_fact      { background: var(--blue-light);   color: var(--blue); }
        .badge-preference     { background: var(--purple-light); color: var(--purple); }
        .badge-decision       { background: var(--amber-light);  color: var(--amber); }
        .badge-working_state  { background: var(--cyan-light);   color: var(--cyan); }
        .badge-knowledge      { background: var(--accent-light); color: var(--accent); }
        .badge-self_reflection{ background: var(--red-light);    color: var(--red); }

        .tag {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 11px;
            background: var(--bg);
            color: var(--text-3);
            border: 1px solid var(--border);
            margin: 1px 2px;
        }

        /* ── Filters ── */
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }

        .filter-select, .filter-input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 11px;
            color: var(--text-2);
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.12s, box-shadow 0.12s;
        }

        .filter-select:focus, .filter-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .filter-input { min-width: 220px; }

        /* ── Detail Panel ── */
        .detail-panel {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 16px;
            display: none;
        }

        .detail-panel.visible { display: block; }

        .detail-row {
            display: grid;
            grid-template-columns: 130px 1fr;
            gap: 4px;
            padding: 7px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 13px;
        }

        .detail-row:last-child { border-bottom: none; }

        .detail-label {
            color: var(--text-4);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            padding-top: 2px;
        }

        .detail-value { color: var(--text-1); word-break: break-word; }

        .detail-text {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-1);
            white-space: pre-wrap;
            font-family: var(--font-mono);
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.12s;
            box-shadow: 0 1px 2px rgba(22,163,74,0.2);
        }

        .btn:hover { background: #15803d; }
        .btn:active { transform: translateY(1px); }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-2);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover { background: var(--bg); }

        /* ── Query Input ── */
        .query-input-wrap { display: flex; gap: 8px; margin-bottom: 18px; }

        .query-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 14px;
            color: var(--text-1);
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.12s, box-shadow 0.12s;
        }

        .query-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        /* ── Score Bar ── */
        .score-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            width: 60px;
            display: inline-block;
            vertical-align: middle;
            margin-left: 6px;
        }

        .score-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }

        /* ── Loading ── */
        .loading { color: var(--text-4); font-size: 13px; padding: 32px; text-align: center; }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 2px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-3);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            cursor: pointer;
            transition: all 0.12s;
            font-family: var(--font);
        }

        .tab-btn:hover { color: var(--text-2); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

        /* ── Toggle ── */
        .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }

        .toggle input:checked + .toggle-slider { background: var(--accent); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

        /* ── Textarea ── */
        textarea {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            color: var(--text-1);
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            outline: none;
            resize: vertical;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.12s, box-shadow 0.12s;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-4); }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">🤖</div>
                    <div>
                        <div class="sidebar-logo-name">SchnuBot</div>
                        <div class="sidebar-logo-sub">Inside the mind</div>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-label">Memory</div>
                    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <rect x="1.5" y="1.5" width="5" height="5" rx="1.2"/><rect x="9.5" y="1.5" width="5" height="5" rx="1.2"/>
                            <rect x="1.5" y="9.5" width="5" height="5" rx="1.2"/><rect x="9.5" y="9.5" width="5" height="5" rx="1.2"/>
                        </svg>
                        Overview
                    </a>
                    <a href="/chunks" class="nav-link {% if request.path == '/chunks' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M2 4h12M2 8h12M2 12h8"/>
                        </svg>
                        Chunks
                    </a>
                    <a href="/retrieval" class="nav-link {% if request.path == '/retrieval' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <circle cx="6.5" cy="6.5" r="4"/><path d="M11 11l3 3"/>
                        </svg>
                        Retrieval
                    </a>
                    <a href="/fasttrack" class="nav-link {% if request.path == '/fasttrack' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M3 8h7M7 5l3 3-3 3M13 4v8"/>
                        </svg>
                        Fast-Track
                    </a>
                    <a href="/consolidator" class="nav-link {% if request.path == '/consolidator' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M4 3h8M4 8h8M6 13h4"/><path d="M8 8v5"/>
                        </svg>
                        Konsolidierer
                    </a>
                    <a href="/timeline" class="nav-link {% if request.path == '/timeline' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <circle cx="4" cy="4" r="1.5"/><circle cx="4" cy="8" r="1.5"/><circle cx="4" cy="12" r="1.5"/>
                            <path d="M7 4h7M7 8h5M7 12h7"/>
                        </svg>
                        Timeline
                    </a>
                    <a href="/quality" class="nav-link {% if request.path == '/quality' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M8 2l1.8 3.6L14 6.3l-3 2.9.7 4.1L8 11.2l-3.7 2.1.7-4.1-3-2.9 4.2-.7z"/>
                        </svg>
                        Qualität
                    </a>
                </div>

                <div class="nav-divider"></div>

                <div class="nav-section">
                    <div class="nav-section-label">KI-Personality</div>
                    <a href="/essence" class="nav-link {% if request.path == '/essence' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 1.5l1.6 3.5 3.9.6-2.8 2.7.7 3.9L8 10.4l-3.4 1.8.7-3.9L2.5 5.6l3.9-.6z"/>
                        </svg>
                        Essence
                    </a>
                    <a href="/tools" class="nav-link {% if request.path == '/tools' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 2a3 3 0 00-2.8 4L3 10.2l.4 2.4 2.4.4L10 9a3 3 0 002-5.2L10.5 5 11 5.5 9.5 7 9 6.5l1.5-1.5-.5-.5A3 3 0 0010 2z"/>
                        </svg>
                        Tools
                    </a>
                    <a href="/diary" class="nav-link {% if request.path == '/diary' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <rect x="3" y="2" width="10" height="12" rx="1.5"/>
                            <path d="M5.5 5.5h5M5.5 8h5M5.5 10.5h3"/>
                        </svg>
                        Diary
                    </a>
                </div>
                <hr style="border:none;border-top:1px solid var(--border,#2a2a3e);margin:8px 8px 10px">
                <div class="nav-section">
                    <div class="nav-section-label">User</div>
                    <a href="/todos" class="nav-link {% if request.path == '/todos' %}active{% endif %}">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M3 4h10M3 8h10M3 12h6"/>
                            <circle cx="13" cy="12" r="2" fill="none"/>
                            <path d="M12 12l.6.6 1.4-1.4"/>
                        </svg>
                        Listen
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-clock" id="sidebar-time"></div>
                <a href="/logout" class="sidebar-logout">↩ Logout</a>
            </div>
        </aside>

        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function updateClock() {
            const el = document.getElementById('sidebar-time');
            if (el) el.textContent = new Date().toLocaleString('de-DE', {
                weekday: 'short', day: '2-digit', month: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
