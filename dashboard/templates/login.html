<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Mr. Robot Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-deep: #09090b;
            --bg-surface: #18181b;
            --bg-elevated: #1f1f23;
            --border: #2e2e33;
            --text-primary: #e4e4e7;
            --text-muted: #71717a;
            --text-dim: #52525b;
            --accent: #22c55e;
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.12);
            --font: 'JetBrains Mono', 'SF Mono', monospace;
            --radius: 10px;
        }
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

        body {
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px;
            width: 100%;
            max-width: 360px;
        }

        .login-brand {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input[type="password"] {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            margin-bottom: 16px;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #09090b;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { opacity: 0.9; }

        .error {
            background: var(--red-dim);
            border: 1px solid var(--red);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--red);
            margin-bottom: 16px;
        }

        .login-footer {
            margin-top: 20px;
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-brand">Mr. Robot</div>
        <div class="login-title">Memory Dashboard</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Token</label>
            <input type="password" name="token" placeholder="••••••••••••••••" autofocus>
            <button type="submit">Einloggen</button>
        </form>

        <div class="login-footer">SchnuBot.ai · Port 5001</div>
    </div>
</body>
</html>
