{% extends "base.html" %}
{% block title %}Übersicht{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Overview</h1>
    <p>Memory status at a glance</p>
</div>

<div class="stats-grid" id="stats-grid">
    <div class="loading">Lade Stats...</div>
</div>

<div style="font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-dim);margin-bottom:10px;margin-top:4px">System</div>
<div class="stats-grid" id="system-grid"></div>

<div class="card">
    <div class="card-header">
        <div>
            <div class="card-title">Chunk-Verteilung nach Typ</div>
            <div class="card-subtitle">Aktive Chunks im Gedächtnis</div>
        </div>
    </div>
    <div id="type-distribution"></div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="card">
        <div class="card-header">
            <div>
                <div class="card-title">Nach Quelle</div>
            </div>
        </div>
        <div id="source-distribution"></div>
    </div>
    <div class="card">
        <div class="card-header">
            <div>
                <div class="card-title">Nach Epistemic Status</div>
            </div>
        </div>
        <div id="epistemic-distribution"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadStats() {
    try {
        const [res, ftRes, consRes, tokRes] = await Promise.all([
            fetch('/api/stats'),
            fetch('/api/fasttrack/stats'),
            fetch('/api/consolidator/stats'),
            fetch('/api/tokens'),
        ]);
        const data = await res.json();
        const ft = ftRes.ok ? await ftRes.json() : null;
        const cons = consRes.ok ? await consRes.json() : null;
        const tok = tokRes.ok ? await tokRes.json() : null;

        const ftRate = ft && ft.total > 0 ? Math.round((ft.stored / ft.total) * 100) : null;
        const ftCard = ft
            ? `<div class="stat-card" style="cursor:pointer" onclick="location.href='/fasttrack'">
                <div class="stat-card-label">Fast-Track heute</div>
                <div class="stat-card-value" style="color:var(--accent)">${ft.today_stored}</div>
                <div class="stat-card-sub">${ft.today_total} Trigger · ${ftRate ?? '—'}% Store-Rate</div>
               </div>`
            : '';

        const consCard = cons
            ? `<div class="stat-card" style="cursor:pointer" onclick="location.href='/consolidator'">
                <div class="stat-card-label">Konsolidierer heute</div>
                <div class="stat-card-value" style="color:var(--blue)">${cons.today_runs}</div>
                <div class="stat-card-sub">${cons.null_runs} No-Op · ${cons.retry_runs} Retries</div>
               </div>`
            : '';

        const tokCard = tok
            ? `<div class="stat-card">
                <div class="stat-card-label">Token heute</div>
                <div class="stat-card-value" style="color:var(--purple, #a78bfa)">${tok.today.total.toLocaleString()}</div>
                <div class="stat-card-sub">${tok.today.calls} Calls · ${tok.today_vs_yesterday !== null ? (tok.today_vs_yesterday > 0 ? '+' : '') + tok.today_vs_yesterday + '% vs gestern' : '—'}</div>
               </div>
               <div class="stat-card">
                <div class="stat-card-label">Token diese Woche</div>
                <div class="stat-card-value" style="color:var(--purple, #a78bfa)">${tok.week_total.toLocaleString()}</div>
                <div class="stat-card-sub">${tok.week_vs_last_week !== null ? (tok.week_vs_last_week > 0 ? '+' : '') + tok.week_vs_last_week + '% vs Vorwoche' : '—'}</div>
               </div>`
            : '';

        document.getElementById('stats-grid').innerHTML = `
            <div class="stat-card">
                <div class="stat-card-label">Aktive Chunks</div>
                <div class="stat-card-value">${data.active_chunks}</div>
                <div class="stat-card-sub">${data.today_count} neu heute</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Archiviert</div>
                <div class="stat-card-value">${data.archived_chunks}</div>
                <div class="stat-card-sub">${data.total_chunks} gesamt</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Chunk-Typen</div>
                <div class="stat-card-value">${Object.keys(data.by_type).length}</div>
                <div class="stat-card-sub">verschiedene Typen aktiv</div>
            </div>
            ${ftCard}
            ${consCard}
            ${tokCard}
            ${data.heartbeat_last_run ? `<div class="stat-card">
                <div class="stat-card-label">Letzter Heartbeat</div>
                <div class="stat-card-value" style="font-size:15px;color:${data.heartbeat_age_min > 240 ? 'var(--amber)' : 'var(--text-primary)'}">${data.heartbeat_last_run}</div>
                <div class="stat-card-sub">vor ${data.heartbeat_age_min < 60 ? data.heartbeat_age_min + ' Min' : Math.round(data.heartbeat_age_min/60) + ' Std'}</div>
            </div>` : ''}
            <div class="stat-card">
                <div class="stat-card-label">Stand</div>
                <div class="stat-card-value" style="font-size:16px">${data.timestamp}</div>
                <div class="stat-card-sub">zuletzt aktualisiert</div>
            </div>
        `;

        document.getElementById('system-grid').innerHTML = `
            <div class="stat-card">
                <div class="stat-card-label">CPU</div>
                <div class="stat-card-value" style="color:${data.system.cpu>80?'var(--red)':data.system.cpu>50?'var(--amber)':'var(--text-primary)'}">${data.system.cpu}%</div>
                <div class="stat-card-sub">Auslastung</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">RAM</div>
                <div class="stat-card-value" style="color:${data.system.ram_percent>85?'var(--red)':data.system.ram_percent>70?'var(--amber)':'var(--text-primary)'}">${data.system.ram_used_gb} GB</div>
                <div class="stat-card-sub">von ${data.system.ram_total_gb} GB · ${data.system.ram_percent}%</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Disk</div>
                <div class="stat-card-value" style="color:${data.system.disk_percent>85?'var(--red)':data.system.disk_percent>70?'var(--amber)':'var(--text-primary)'}">${data.system.disk_used_gb} GB</div>
                <div class="stat-card-sub">von ${data.system.disk_total_gb} GB · ${data.system.disk_percent}%</div>
            </div>
            <div class="stat-card"><div class="stat-card-label">Uptime</div><div class="stat-card-value" style="font-size:14px">${data.system.uptime}</div><div class="stat-card-sub">Server läuft</div></div>
        `;

        // Type distribution
        const typeHtml = Object.entries(data.by_type)
            .sort((a, b) => b[1] - a[1])
            .map(([type, count]) => {
                const max = Math.max(...Object.values(data.by_type));
                const pct = Math.round((count / max) * 100);
                return `<div style="display:flex;align-items:center;gap:12px;padding:6px 0;">
                    <span class="badge badge-${type}" style="min-width:100px;text-align:center">${type}</span>
                    <div style="flex:1;height:6px;background:var(--bg-hover);border-radius:3px;overflow:hidden">
                        <div style="width:${pct}%;height:100%;background:var(--accent);border-radius:3px"></div>
                    </div>
                    <span style="color:var(--text-secondary);min-width:30px;text-align:right">${count}</span>
                </div>`;
            }).join('');
        document.getElementById('type-distribution').innerHTML = typeHtml;

        // Source distribution
        const srcHtml = Object.entries(data.by_source)
            .sort((a, b) => b[1] - a[1])
            .map(([src, count]) => `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px">
                <span style="color:var(--text-secondary)">${src}</span>
                <span style="color:var(--text-primary)">${count}</span>
            </div>`).join('');
        document.getElementById('source-distribution').innerHTML = srcHtml;

        // Epistemic distribution
        const epHtml = Object.entries(data.by_epistemic)
            .sort((a, b) => b[1] - a[1])
            .map(([ep, count]) => `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px">
                <span style="color:var(--text-secondary)">${ep}</span>
                <span style="color:var(--text-primary)">${count}</span>
            </div>`).join('');
        document.getElementById('epistemic-distribution').innerHTML = epHtml;

    } catch (e) {
        const tokCard = tok
            ? `<div class="stat-card">
                <div class="stat-card-label">Token heute</div>
                <div class="stat-card-value" style="color:var(--purple, #a78bfa)">${tok.today.total.toLocaleString()}</div>
                <div class="stat-card-sub">${tok.today.calls} Calls · ${tok.today_vs_yesterday !== null ? (tok.today_vs_yesterday > 0 ? '+' : '') + tok.today_vs_yesterday + '% vs gestern' : '—'}</div>
               </div>
               <div class="stat-card">
                <div class="stat-card-label">Token diese Woche</div>
                <div class="stat-card-value" style="color:var(--purple, #a78bfa)">${tok.week_total.toLocaleString()}</div>
                <div class="stat-card-sub">${tok.week_vs_last_week !== null ? (tok.week_vs_last_week > 0 ? '+' : '') + tok.week_vs_last_week + '% vs Vorwoche' : '—'}</div>
               </div>`
            : '';

        document.getElementById('stats-grid').innerHTML = `<div class="loading">Fehler: ${e.message}</div>`;
    }
}

loadStats();
</script>
{% endblock %}
